<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    table{
        width: 500px;
        border-collapse: collapse;
        border: 5px solid black;
       height: 500px;
    }

    td{
        border: 2px solid red;
        text-align: left;
        vertical-align: top;
    }

    .c3{
        background-color: blue;
        color: rgb(255, 255, 255);
        text-align: right;
        vertical-align: bottom;
    }
    
</style>

<body>

    <table>

<tr>
    <td>A1</td>
    <td>B1</td>
    <td>C1</td>
    <td>D1</td>
</tr>

<tr>
    <td>A2</td>
    <td>B2</td>
    <td>C2</td>
    <td>D2</td>
</tr>

<tr>
    <td>A3</td>
    <td>B3</td>
    <td class="c3">C3</td>
    <td>D3</td>
</tr>

<tr>
    <td>A4</td>
    <td>B4</td>
    <td>C4</td>
    <td>D4</td>
</tr>


    </table>
    
</body>
</html>
