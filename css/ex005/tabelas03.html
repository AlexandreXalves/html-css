<style>

        width: 300px;
        border-collapse: collapse;
    }

    td{
        border: 1px solid black;
        padding: 10px;
        text-align: center;
    }
</style>

<body>

            <td>E</td>
            <td>G</td>
        </tr>

        <tr>
            
            <td colspan="2">I</td>
            
        </tr>

    </table>

</body>
