<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Teste de formulario</h1>

    <form action="sddda" method="post">

        <p>
            <label for="iano">Em que ano você nasceu?</label>
            <input type="number" name="ano" id="iano" min="1900" max="2026" oninput="iidade.innerHTML = 2026 - Number(iano.value)">
        </p>

        <p>
            <label for="iidade">Sua idade é:</label>
            <output id="iidade">0</output>
        </p>

<p>
    <input type="reset" value="Limpar">
    <input type="submit" value="Enviar">
</p>

    </form>

</body>
</html>
