<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Teste de formulario</h1>

    <form action="teste.php" method="get" autocomplete="on">

        <p>
            <label for="iuso"> Usuario:</label>
            <input type="text" name="usuario" id="iuso" required minlength="8" placeholder="login" autocomplete="username">
        </p>

        <p>
            <label for="isen"> Senha:</label>
            <input type="password" name="senha" id="isen" required minlength="4" placeholder="senha" autocomplete="current-password">
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>


    </form>
    
</body>
</html>
