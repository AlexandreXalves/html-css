<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alinhamento vertical</title>
</head>
<body>

    <style>

        #conteiner{
            background-color: maroon;
            height: 100vh;

        }

        #conteudo{
            background-color: green;
            width: 400px;
            height: 300px;

            position: relative;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);

        }

    </style>

    <section id="conteiner">
        <article id="conteudo">

        </article>

    </section>
    
</body>
</html>
