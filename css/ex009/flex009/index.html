<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexesive box</title>
    <style>
        .conteiner{
            display: flex;
            background-color: blue;

            flex-flow: row nowrap;

        }

        .iten{
            background-color: chocolate;
            border: 1px solid black;
        
            text-align: center;
            flex-basis: auto;
        }

        #p1{
            flex-basis: 200px;
      
        }
    </style>
</head>
<body>
        <div class="conteiner">
            <div class="iten">A</div>
            <div class="iten">Esse e um bloco grande</div>
            <div class="iten">C</div>
            <div class="iten" id="p1">D</div>
            <div class="iten">Esse e um bloco muito muito grande</div>
            <div class="iten">F</div>
            <div class="iten">Esse um bloco extremamente muito muito grande</div>
            <div class="iten">H</div>
        </div>
</body>
</html>
