 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexesive box</title>
    <style>
        .conteiner{
            display: flex;
            background-color: blue;
            
            flex-flow: row wrap;
        }

        .iten{
            background-color: chocolate;
            border: 1px solid black;
            text-align: center;
            flex: auto;
        }
    </style>
</head>
<body>
        <div class="conteiner">
            <div class="iten"> Exenplo de bloco A</div>
            <div class="iten"> Exenplo de bloco B</div>
            <div class="iten"> Exenplo de bloco C</div>
            <div class="iten"> Exenplo de bloco D</div>
            <div class="iten"> Exenplo de bloco E</div>
            <div class="iten"> Exenplo de bloco F</div>
            <div class="iten"> Exenplo de bloco G</div>
            <div class="iten"> Exenplo de bloco H</div>
        </div>
</body>
</html>
