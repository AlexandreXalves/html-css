<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexesive box</title>
    <style>
        .conteiner{
            background-color: blue;

             display: flex;
             flex-flow: row wrap;
        }

        .iten{
            background-color: chocolate;
            border: 1px solid black;
            text-align: center;
            padding: 40px;
        
        }

#i1{
    order: 8;
    background-color: rgb(11, 255, 72)
}

#i8{
    order: -9;
    background-color: rgb(255, 11, 194)
}
              
    </style>
</head>
<body>
        <div class="conteiner">
            <div class="iten" id="i1">A</div>
            <div class="iten" id="i2">B</div>
            <div class="iten" id="i3">C</div>
            <div class="iten" id="i4">D</div>
            <div class="iten" id="i5">E</div>
            <div class="iten" id="i6">F</div>
            <div class="iten" id="i7">G</div>
            <div class="iten" id="i8">H</div>
        </div>
</body>
</html>
